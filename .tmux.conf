### ── Prefix key: Ctrl+a (easier than default Ctrl+b) ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

### ── Pane splitting: | and - (intuitive) ──
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

### ── Pane navigation: Alt+arrow (no prefix needed) ──
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

### ── Pane resizing: Ctrl+arrow ──
bind -n C-Left  resize-pane -L 5
bind -n C-Right resize-pane -R 5
bind -n C-Up    resize-pane -U 5
bind -n C-Down  resize-pane -D 5

### ── Mouse support ──
set -g mouse on

### ── Modern terminal colors ──
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

### ── Start windows and panes at 1, not 0 ──
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

### ── Faster key response (no ESC delay) ──
set -sg escape-time 10
set -g focus-events on

### ── Copy mode: vim keys ──
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

### ── Reload config ──
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

### ── Plugins ──
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save sessions
set -g @plugin 'catppuccin/tmux'               # modern status bar

### ── tmux-continuum: auto-save every 15 min ──
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

### ── Catppuccin theme config ──
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_left_separator "█"

### ── Initialize plugin manager (keep at bottom) ──
run '~/.tmux/plugins/tpm/tpm'
